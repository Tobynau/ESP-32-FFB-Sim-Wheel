<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 FFB Wheel Tuner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>ESP32 FFB Wheel Tuner</h1>
      <p class="subtitle">Web Serial tuning and live telemetry (separate USB CDC interface)</p>
      <div class="toolbar">
        <button id="connectBtn" class="btn primary">Connect</button>
        <button id="disconnectBtn" class="btn" disabled>Disconnect</button>
        <button id="recenterBtn" class="btn accent" disabled>Recenter</button>
        <span id="status" class="status">Disconnected</span>
      </div>
    </header>

    <section class="grid two-col">
      <article class="card">
        <h2>Wheel</h2>
        <div class="control">
          <label for="max_angle_deg">Max Angle (deg)</label>
          <input id="max_angle_deg" type="range" min="180" max="2160" step="10" />
          <output id="max_angle_deg_out"></output>
        </div>
        <div class="control">
          <label for="angle_limit_stiffness">Angle Limit Stiffness</label>
          <input id="angle_limit_stiffness" type="range" min="0" max="2000" step="5" />
          <output id="angle_limit_stiffness_out"></output>
        </div>
      </article>

      <article class="card">
        <h2>Power</h2>
        <div class="control">
          <label for="overall_strength">Overall Strength</label>
          <input id="overall_strength" type="range" min="0" max="2" step="0.01" />
          <output id="overall_strength_out"></output>
        </div>
        <div class="control">
          <label for="motor_max_amps">Motor Max Amps</label>
          <input id="motor_max_amps" type="range" min="1" max="80" step="0.5" />
          <output id="motor_max_amps_out"></output>
        </div>
        <div class="control">
          <label for="device_gain">Device Gain (host FFB gain)</label>
          <input id="device_gain" type="range" min="0" max="1" step="0.01" />
          <output id="device_gain_out"></output>
        </div>
      </article>
    </section>

    <section class="card">
      <h2>FFB Effect Scales</h2>
      <div class="grid three-col">
        <div class="control"><label for="scale_constant">Constant</label><input id="scale_constant" type="range" min="0" max="2" step="0.01" /><output id="scale_constant_out"></output></div>
        <div class="control"><label for="scale_spring">Spring</label><input id="scale_spring" type="range" min="0" max="2" step="0.01" /><output id="scale_spring_out"></output></div>
        <div class="control"><label for="scale_damper">Damper</label><input id="scale_damper" type="range" min="0" max="2" step="0.01" /><output id="scale_damper_out"></output></div>
        <div class="control"><label for="scale_inertia">Inertia</label><input id="scale_inertia" type="range" min="0" max="2" step="0.01" /><output id="scale_inertia_out"></output></div>
        <div class="control"><label for="scale_friction">Friction</label><input id="scale_friction" type="range" min="0" max="2" step="0.01" /><output id="scale_friction_out"></output></div>
        <div class="control"><label for="scale_periodic">Periodic</label><input id="scale_periodic" type="range" min="0" max="2" step="0.01" /><output id="scale_periodic_out"></output></div>
      </div>
    </section>

    <section class="card telemetry">
      <h2>Live Telemetry</h2>
      <div class="stats">
        <div><span>Steering Angle</span><strong id="tel_angle">0.00°</strong></div>
        <div><span>Velocity</span><strong id="tel_vel">0.00 rad/s</strong></div>
        <div><span>Button Bits</span><strong id="tel_buttons">0</strong></div>
        <div><span>Left Paddle</span><strong id="tel_left">0</strong></div>
        <div><span>Right Paddle</span><strong id="tel_right">0</strong></div>
        <div><span>Cmd Current</span><strong id="tel_cmd">0.00 A</strong></div>
        <div><span>Motor Current</span><strong id="tel_motor">0.00 A</strong></div>
        <div><span>FFB Active</span><strong id="tel_ffb">0</strong></div>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
